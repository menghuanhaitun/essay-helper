<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>初始化数据库</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f9f9f9;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🗄️ 数据库初始化</h1>
    <p>点击下面的按钮来初始化词库数据库：</p>
    <button onclick="initDatabase()">🚀 初始化数据库</button>
    <button onclick="testVocab()">🔍 测试词库API</button>
    <div id="result">等待操作...</div>

    <script>
        async function initDatabase() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>⏳ 正在初始化数据库...</p>';

            try {
                const response = await fetch('https://essay-helper.pages.dev/api/init-db', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    result.innerHTML = `
                        <h2>✅ 初始化成功！</h2>
                        <p><strong>词汇数量：</strong>${data.stats.words}</p>
                        <p><strong>句子数量：</strong>${data.stats.sentences}</p>
                        <p><strong>总计：</strong>${data.stats.total}</p>
                        <p>🎉 词库已成功导入到数据库！</p>
                    `;
                } else {
                    result.innerHTML = `<h2>❌ 初始化失败</h2><p>${data.error}</p>`;
                }
            } catch (error) {
                result.innerHTML = `
                    <h2>❌ 请求失败</h2>
                    <p><strong>错误信息：</strong>${error.message}</p>
                    <p>请检查：</p>
                    <ul>
                        <li>Cloudflare Pages 是否部署完成</li>
                        <li>网络连接是否正常</li>
                        <li>API 路径是否正确</li>
                    </ul>
                `;
            }
        }

        async function testVocab() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>⏳ 正在测试词库API...</p>';

            try {
                const response = await fetch('https://essay-helper.pages.dev/api/vocab-library?limit=5');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    result.innerHTML = `
                        <h2>✅ 词库测试成功！</h2>
                        <p>找到 ${data.data.length} 条词库数据：</p>
                        <pre>${JSON.stringify(data.data, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `<h2>❌ 测试失败</h2><p>${data.error}</p>`;
                }
            } catch (error) {
                result.innerHTML = `
                    <h2>❌ 请求失败</h2>
                    <p><strong>错误信息：</strong>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
